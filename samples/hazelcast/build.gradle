dependencies {
    compile project(':spring-session'),
            "com.hazelcast:hazelcast-client:3.3.3",
            jstlDependencies

    provided "javax.servlet:javax.servlet-api:$servletApiVersion"

    testCompile 'junit:junit:4.11'

    integrationTestCompile gebDependencies
}