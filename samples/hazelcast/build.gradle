apply from: JAVA_GRADLE
// 注释掉tomcat配置，因为网络问题
// apply from: TOMCAT_GRADLE

tasks.findByPath("artifactoryPublish")?.enabled = false
// 注释掉sonarRunner配置，因为插件被注释掉了
/*
